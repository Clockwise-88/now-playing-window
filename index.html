<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Now Playing</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        #pip-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: row;
            justify-content: flex-start;
            align-items: center;
            background: #222;
            color: white;
            box-sizing: border-box;
            overflow: hidden;
        }
        #album-art {
            height: 100%;
            aspect-ratio: var(--art-aspect-ratio);
            object-fit: cover;
            flex-shrink: 0;
            display: block;
        }
        #album-art-placeholder {
            height: 100%;
            aspect-ratio: var(--art-aspect-ratio);
            background: #444;
            flex-shrink: 0;
        }
        #text-block {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 8px 12px;
            flex: 1;
            min-width: 0;
            height: 100%;
            box-sizing: border-box;
            /* Fixed gap between song and artist — does not grow with scale */
            gap: 3px;
        }
        #song-name {
            font-size: var(--font-size-song);
            font-weight: bold;
            margin: 0;
            white-space: normal;
            overflow: hidden;
            /* px line-height so wrapped lines stay tight regardless of scale */
            line-height: var(--line-height-song);
        }
        #artist-name {
            font-size: var(--font-size-artist);
            margin: 0;
            color: #aaa;
            white-space: normal;
            overflow: hidden;
            line-height: var(--line-height-artist);
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Music Now Playing</h1>
    <p>Interaction Required for this to work</p>
    <button id="open-pip-button">Open "Now playing" Window</button>

    <!-- This container will be moved to the PiP window -->
    <div id="pip-container" style="display: none;">
        <img id="album-art" src="" alt="Album Art" style="display:none;" />
        <div id="album-art-placeholder"></div>
        <div id="text-block">
            <p id="song-name">Loading...</p>
            <p id="artist-name"></p>
        </div>
    </div>

    <script>
        // ─────────────────────────────────────────────
        // SCALING CONFIGURATION
        //
        // SCALE      — Real pixel multiplier for the entire PiP window (width + height).
        //              1.0 = default, 2.0 = double size, 0.5 = half size.
        //
        // TEXT_SCALE — Independent font-size multiplier. Does NOT affect the window size
        //              or album art. 1.0 = auto-sized to window height, 1.5 = 50% larger,
        //              0.8 = smaller.
        //
        // BASE_WIDTH / BASE_HEIGHT — The "1×" pixel dimensions of the PiP window.
        //
        // ART_ASPECT_RATIO — CSS aspect-ratio of the album art column.
        //                    "1 / 1" = square, "4 / 3" = landscape.
        // ─────────────────────────────────────────────
        const CONFIG = {
            SCALE:            1.0,      // Window scale multiplier
            TEXT_SCALE:       0.5,      // Font size multiplier (independent of window scale)
            BASE_WIDTH:       350,      // Base PiP window width  (pixels, at SCALE = 1.0)
            BASE_HEIGHT:      100,      // Base PiP window height (pixels, at SCALE = 1.0)
            ART_ASPECT_RATIO: "1 / 1",  // Album art column aspect ratio
        };
        // ─────────────────────────────────────────────

        const pipContainer  = document.getElementById('pip-container');
        const albumArt      = document.getElementById('album-art');
        const albumArtPh    = document.getElementById('album-art-placeholder');
        const songDisplay   = document.getElementById('song-name');
        const artistDisplay = document.getElementById('artist-name');

        // Compute real pixel dimensions for the PiP window request
        const pipWidth  = Math.round(CONFIG.BASE_WIDTH  * CONFIG.SCALE);
        const pipHeight = Math.round(CONFIG.BASE_HEIGHT * CONFIG.SCALE);

        // Apply all CSS variables derived from CONFIG.
        // Font sizes are based on the real window height × TEXT_SCALE.
        // Line-heights are fixed in px (font-size × 1.15) so that wrapping lines
        // never expand the gap between song title and artist name.
        function applyStyles() {
            const actualHeight = CONFIG.BASE_HEIGHT * CONFIG.SCALE;

            const fontSong   = +(actualHeight * 0.26 * CONFIG.TEXT_SCALE).toFixed(1);
            const fontArtist = +(actualHeight * 0.20 * CONFIG.TEXT_SCALE).toFixed(1);
            // Fixed-px line-height: wrapping adds lines of exactly this height, no more
            const lhSong     = +(fontSong   * 1.15).toFixed(1);
            const lhArtist   = +(fontArtist * 1.15).toFixed(1);

            pipContainer.style.setProperty('--art-aspect-ratio',  CONFIG.ART_ASPECT_RATIO);
            pipContainer.style.setProperty('--font-size-song',    fontSong   + 'px');
            pipContainer.style.setProperty('--font-size-artist',  fontArtist + 'px');
            pipContainer.style.setProperty('--line-height-song',  lhSong     + 'px');
            pipContainer.style.setProperty('--line-height-artist', lhArtist  + 'px');
        }

        applyStyles();

        async function updateMusic() {
            try {
                const [musicRes, artRes] = await Promise.all([
                    fetch("https://clockwise3000.online/music.txt"),
                    fetch("https://clockwise3000.online/album-art.txt")
                ]);

                // Parse music text: format is "Song Name ~ Artist"
                if (musicRes.ok) {
                    const text = (await musicRes.text()).trim();
                    const tildeIdx = text.lastIndexOf(' ~ ');
                    if (tildeIdx !== -1) {
                        songDisplay.textContent   = text.slice(0, tildeIdx).trim();
                        artistDisplay.textContent = text.slice(tildeIdx + 3).trim();
                    } else {
                        songDisplay.textContent   = text;
                        artistDisplay.textContent = '';
                    }
                }

                // Parse album art URL
                if (artRes.ok) {
                    const artUrl = (await artRes.text()).trim();
                    if (artUrl) {
                        albumArt.src = artUrl;
                        albumArt.style.display = 'block';
                        albumArtPh.style.display = 'none';
                    } else {
                        albumArt.style.display = 'none';
                        albumArtPh.style.display = 'block';
                    }
                } else {
                    albumArt.style.display = 'none';
                    albumArtPh.style.display = 'block';
                }

            } catch (err) {
                console.error("CORS or Fetch error:", err);
                songDisplay.textContent   = "Error loading music info";
                artistDisplay.textContent = '';
                albumArt.style.display    = 'none';
                albumArtPh.style.display  = 'block';
            }
        }

        updateMusic();
        setInterval(updateMusic, 1000);

        if ('documentPictureInPicture' in window) {
            document.getElementById('open-pip-button').addEventListener('click', async () => {
                const pipWindow = await window.documentPictureInPicture.requestWindow({
                    width:  pipWidth,
                    height: pipHeight
                });

                // Copy styles to the new window
                [...document.styleSheets].forEach((styleSheet) => {
                    try {
                        const cssRules = [...styleSheet.cssRules].map((rule) => rule.cssText).join('');
                        const style = document.createElement('style');
                        style.textContent = cssRules;
                        pipWindow.document.head.appendChild(style);
                    } catch (e) {
                        const link = document.createElement('link');
                        link.rel = 'stylesheet';
                        link.href = styleSheet.href;
                        pipWindow.document.head.appendChild(link);
                    }
                });

                // Move the container into the PiP window and re-apply CSS vars
                pipWindow.document.body.append(pipContainer);
                pipContainer.style.display = 'flex';
                applyStyles();

                // Return it to the main page when PiP closes
                pipWindow.addEventListener('pagehide', () => {
                    document.body.append(pipContainer);
                    pipContainer.style.display = 'none';
                    applyStyles();
                });
            });
        } else {
            const btn = document.getElementById('open-pip-button');
            btn.disabled = true;
            btn.textContent = 'Document PiP API not supported';
        }
    </script>
</body>
</html>
